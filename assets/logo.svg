<svg width="420" height="120" viewBox="0 0 420 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Leash">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Icon: a collar ring with a tether clip — "on a leash" -->
  <g transform="translate(20 18)">
    <circle cx="42" cy="42" r="30" fill="none" stroke="url(#g)" stroke-width="9"/>
    <!-- tether leading off the ring -->
    <path d="M64 22 C 84 6, 96 6, 96 24 C 96 38, 84 40, 78 34" fill="none" stroke="url(#g)" stroke-width="9" stroke-linecap="round"/>
    <!-- the tag -->
    <circle cx="42" cy="42" r="8" fill="url(#g)"/>
  </g>
  <!-- Wordmark -->
  <text x="138" y="76" font-family="ui-sans-serif, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#e5e7eb" letter-spacing="-1.5">Leash</text>
</svg>
